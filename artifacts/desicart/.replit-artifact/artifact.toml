kind = "web"
previewPath = "/"
title = "DesiCart"
version = "1.0.0"
id = "artifacts/desicart"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19034

[services.development]
run = "pnpm --filter @workspace/desicart run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/desicart", "run", "build" ]
publicDir = "artifacts/desicart/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19034"
BASE_PATH = "/"
